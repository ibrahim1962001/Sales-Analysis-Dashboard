services:
  db:
    image: postgis/postgis:16-3.4-alpine
    container_name: kimit_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "1234"
      POSTGRES_DB: kimit_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d kimit_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kimit_network

  minio:
    image: minio/minio:latest
    container_name: kimit_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: kimit_admin
      MINIO_ROOT_PASSWORD: kimit_storage_secret
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - kimit_network

  metabase:
    image: metabase/metabase:latest
    container_name: kimit_metabase
    restart: unless-stopped
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: kimit_db
      MB_DB_PORT: 5432
      MB_DB_USER: postgres
      MB_DB_PASS: 1234
      MB_DB_HOST: db
    ports:
      - "3000:3000"
    volumes:
      - metabase_data:/metabase.db
    depends_on:
      db:
        condition: service_healthy
    networks:
      - kimit_network

  redis:
    image: redis:7-alpine
    container_name: kimit_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kimit_network

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kimit_api
    restart: unless-stopped
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=1234
      - POSTGRES_DB=kimit_db
      - DATABASE_URL=postgresql+asyncpg://postgres:1234@db:5432/kimit_db
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - FERNET_KEY=vE7f-JzR1m_3k8Lp9zW2xY4vQ6sT8uN0mK9iH7gD5eA=
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=kimit_admin
      - MINIO_SECRET_KEY=kimit_storage_secret
      - MINIO_SECURE=false
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    volumes:
      - ./backend:/app
    networks:
      - kimit_network

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kimit_celery
    restart: unless-stopped
    command: celery -A app.workers.celery_app worker --loglevel=info
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=1234
      - POSTGRES_DB=kimit_db
      - DATABASE_URL=postgresql+asyncpg://postgres:1234@db:5432/kimit_db
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - FERNET_KEY=vE7f-JzR1m_3k8Lp9zW2xY4vQ6sT8uN0mK9iH7gD5eA=
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=kimit_admin
      - MINIO_SECRET_KEY=kimit_storage_secret
      - MINIO_SECURE=false
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.workers.celery_app inspect ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    volumes:
      - ./backend:/app
    networks:
      - kimit_network

  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kimit_flower
    restart: unless-stopped
    command: celery -A app.workers.celery_app flower --port=5555
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    ports:
      - "5555:5555"
    depends_on:
      redis:
        condition: service_healthy
      celery_worker:
        condition: service_started
    networks:
      - kimit_network

volumes:
  postgres_data:
  minio_data:
  metabase_data:

networks:
  kimit_network:
    driver: bridge